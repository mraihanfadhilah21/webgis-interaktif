<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGIS Interaktif</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    header { padding: 10px; background: #2c3e50; color: white; text-align: center; }
    #map { height: 90vh; }
    .legend { background: white; padding: 10px; line-height: 1.5; }
    .filter { position: absolute; top: 80px; left: 10px; background: white; padding: 10px; z-index: 1000; }
    .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; }
  </style>
</head>
<body>

<header>
  <h2>WebGIS Interaktif - GitHub Pages</h2>
  <p>Data dari Google Sheets</p>
</header>

<div class="filter">
  <strong>Filter Kategori</strong><br>
  <input type="checkbox" id="cat1" checked> Kategori A<br>
  <input type="checkbox" id="cat2" checked> Kategori B
</div>

<div id="map"></div>
<div class="loading" id="loading">Loading...</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([-7.8, 110.4], 10);

  // Base maps
  var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  var sat = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenTopoMap'
  });

  var baseMaps = {
    "OSM": osm,
    "Topo": sat
  };

  L.control.layers(baseMaps).addTo(map);

  var markers = [];

  function loadData() {
    document.getElementById('loading').style.display = 'block';

    fetch('https://opensheet.elk.sh/YOUR_SHEET_ID/Sheet1')
      .then(res => res.json())
      .then(data => {
        data.forEach(d => {
          var lat = parseFloat(d.lat);
          var lng = parseFloat(d.lng);
          var kategori = d.kategori;

          var color = kategori === 'A' ? 'red' : 'blue';

          var marker = L.circleMarker([lat, lng], {
            color: color
          }).bindPopup(`<b>${d.nama}</b><br>${kategori}`);

          marker.category = kategori;
          marker.addTo(map);
          markers.push(marker);
        });

        document.getElementById('loading').style.display = 'none';
      });
  }

  function filterData() {
    var cat1 = document.getElementById('cat1').checked;
    var cat2 = document.getElementById('cat2').checked;

    markers.forEach(m => {
      if ((m.category === 'A' && cat1) || (m.category === 'B' && cat2)) {
        m.addTo(map);
      } else {
        map.removeLayer(m);
      }
    });
  }

  document.getElementById('cat1').onchange = filterData;
  document.getElementById('cat2').onchange = filterData;

  loadData();

  // Legend
  var legend = L.control({position: 'bottomright'});
  legend.onAdd = function () {
    var div = L.DomUtil.create('div', 'legend');
    div.innerHTML =
      '<b>Legenda</b><br>' +
      '<i style="color:red">●</i> Kategori A<br>' +
      '<i style="color:blue">●</i> Kategori B';
    return div;
  };
  legend.addTo(map);
</script>

</body>
</html>
