<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGIS Interaktif</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    header { padding: 10px; background: #2c3e50; color: white; text-align: center; }
    #map { height: 90vh; }
    .legend { background: white; padding: 10px; line-height: 1.5; }
    .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 2000; }
  </style>
</head>
<body>

<header>
  <h2>WebGIS Interaktif Yogyakarta</h2>
  <p>Nama: Muhammad Raihan Fadhilah | NIM: 24/539466/SV/24606</p>
</header>

<div id="map"></div>
<div class="loading" id="loading">Loading...</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([-7.8, 110.4], 10);

  // Base maps
  var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  var topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenTopoMap'
  });

  var baseMaps = {
    "OSM": osm,
    "Topo": topo
  };

  // Layer group per kategori
  var wisataLayer = L.layerGroup();
  var kulinerLayer = L.layerGroup();
  var fasilitasLayer = L.layerGroup();

  var overlayMaps = {
    "Tempat Wisata": wisataLayer,
    "Kuliner": kulinerLayer,
    "Fasilitas Umum": fasilitasLayer
  };

  // Control (kategori muncul di bawah basemap)
  L.control.layers(baseMaps, overlayMaps).addTo(map);

  // Custom icons
  var iconWisata = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/128/11137/11137156.png',
    iconSize: [25, 25]
  });

  var iconKuliner = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/128/6078/6078099.png',
    iconSize: [25, 25]
  });

  var iconFasilitas = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/128/15654/15654202.png',
    iconSize: [25, 25]
  });

  function loadData() {
    document.getElementById('loading').style.display = 'block';

    fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vSxqP6EugqhcuUzU13n3o5zVdL8lR7gQTntg7IzXCUua6ASpcs8UQvW3EWNyNUqGiH_lcc54P9qt9o6/pub?output=csv')
      .then(res => res.text())
      .then(csv => {
        var rows = csv.split('\n').slice(1);

        rows.forEach(row => {
          var cols = row.split(',');

          var nama = cols[0];
          var lat = parseFloat(cols[1]);
          var lon = parseFloat(cols[2]);
          var kategori = cols[3];
          var deskripsi = cols[4];

          if (isNaN(lat) || isNaN(lng)) return;

          var marker;

          if (kategori === 'wisata') {
            marker = L.marker([lat, lng], {icon: iconWisata});
            marker.addTo(wisataLayer);
          } else if (kategori === 'kuliner') {
            marker = L.marker([lat, lng], {icon: iconKuliner});
            marker.addTo(kulinerLayer);
          } else if (kategori === 'fasum') {
            marker = L.marker([lat, lng], {icon: iconFasilitas});
            marker.addTo(fasilitasLayer);
          }

          if (marker) {
            marker.bindPopup(`<b>${nama}</b><br>${deskripsi}`);
          }
        });

        wisataLayer.addTo(map);
        kulinerLayer.addTo(map);
        fasilitasLayer.addTo(map);

        document.getElementById('loading').style.display = 'none';
      });
  }

  loadData();

  // Legend kanan bawah
  var legend = L.control({position: 'bottomright'});

  legend.onAdd = function () {
    var div = L.DomUtil.create('div', 'legend');
    div.innerHTML = `
      <b>Legenda</b><br>
      <img src="https://cdn-icons-png.flaticon.com/128/11137/11137156.png" width="15"> Tempat Wisata<br>
      <img src="https://cdn-icons-png.flaticon.com/128/6078/6078099.png" width="15"> Kuliner<br>
      <img src="https://cdn-icons-png.flaticon.com/128/15654/15654202.png" width="15"> Fasilitas Umum
    `;
    return div;
  };

  legend.addTo(map);

</script>

</body>
</html>
